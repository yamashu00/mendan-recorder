<!DOCTYPE html>
<html lang="ja">

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面談録音ツール | Kamiyama Marugoto College</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --font-main: 'Noto Sans JP', sans-serif;
      --color-bg: #FFFFFF;
      --color-text: #000000;
      --color-text-sub: #888888;
      --color-border: #000000;
      --color-gray-bg: #F8F8F8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-main);
      margin: 0;
      padding: 60px 20px;
      /* 上部にたっぷり余白 */
      background-color: var(--color-gray-bg);
      color: var(--color-text);
      display: block;
      /* 中央寄せではなく上から並べる */
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background-color: var(--color-bg);
      padding: 60px 45px;
      border: 2px solid var(--color-border);
      margin: 0 auto;
      /* 中央寄せ */
    }

    /* 🚩 ヘッダー: 円弧とテキストの配置を最適化 */
    header {
      margin-bottom: 60px;
      position: relative;
    }

    .logo-arc {
      position: absolute;
      top: -35px;
      /* 上に逃がす */
      left: -20px;
      width: 130px;
      height: 130px;
      border: 1px solid var(--color-border);
      border-radius: 50%;
      clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
      z-index: 0;
      opacity: 0.8;
    }

    .header-text {
      position: relative;
      z-index: 1;
    }

    .college-name-en {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--color-text-sub);
      margin-bottom: 8px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.12em;
      margin: 0;
    }

    .header-line {
      width: 100%;
      height: 2px;
      background-color: var(--color-border);
      margin-top: 25px;
    }

    .input-group {
      margin-bottom: 35px;
    }

    .input-group label {
      display: block;
      margin-bottom: 12px;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.05em;
    }

    .input-group select,
    .input-group input {
      width: 100%;
      padding: 14px;
      border: 1.5px solid var(--color-border);
      border-radius: 0;
      font-size: 15px;
      font-family: var(--font-main);
      background: var(--color-bg);
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '';
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 6px solid var(--color-text);
      pointer-events: none;
    }

    .filename-preview {
      border: 1px solid #EEE;
      background-color: #FAFAFA;
      padding: 18px;
      font-size: 12px;
      color: var(--color-text-sub);
      margin-bottom: 35px;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin: 30px 0;
    }

    button {
      flex: 1;
      background-color: var(--color-accent);
      color: var(--color-btn-text);
      border: 1px solid var(--color-border);
      border-radius: 0;
      padding: 18px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      font-family: var(--font-main);
      transition: opacity 0.2s;
    }

    button:hover:not(:disabled) {
      opacity: 0.7;
    }

    button:disabled {
      background-color: #FFF !important;
      color: #DDD !important;
      border-color: #EEE !important;
      cursor: not-allowed;
    }

    #saveButton {
      width: 100%;
      margin-top: 10px;
    }

    #status {
      margin-top: 40px;
      font-size: 11px;
      text-align: center;
      color: var(--color-text-sub);
      letter-spacing: 0.05em;
    }

    .recording-state {
      background-color: var(--color-accent) !important;
      animation: pulse-black 1.5s infinite;
    }

    @keyframes pulse-black {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.6;
      }

      100% {
        opacity: 1;
      }
    }

    .hidden {
      display: none;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
</head>

<body>

  <div class="container">
    <header>
      <div class="logo-arc"></div>
      <div class="header-text">
        <div class="college-name-en">Kamiyama Marugoto College</div>
        <h1>面談録音ツール</h1>
      </div>
      <div class="header-line"></div>
    </header>

    <div id="loginView">
      <div class="input-group">
        <label>メールアドレス</label>
        <input type="email" id="emailInput" placeholder="example@kamiyama.ac.jp">
      </div>
      <button id="otpRequestBtn" style="max-width: 220px;">認証コード送信</button>

      <div id="otpSection" class="hidden" style="margin-top:40px;">
        <div class="input-group">
          <label>認証コード</label>
          <input type="text" id="otpInput" maxlength="6">
        </div>
        <button id="verifyBtn" style="max-width: 220px;">ログイン</button>
      </div>
    </div>

    <div id="mainView" class="hidden">
      <div class="input-group">
        <label>区分</label>
        <div class="select-wrapper">
          <select id="categorySelect">
            <option value="学生面談">学生面談</option>
            <option value="まるさぽ">まるさぽ</option>
            <option value="クラマネ面談">クラマネ面談</option>
          </select>
        </div>
      </div>
      <div class="input-group">
        <label>学生</label>
        <div class="select-wrapper">
          <select id="studentSelect">
            <option value="">-- 選択してください --</option>
          </select>
        </div>
      </div>
      <div class="filename-preview" id="filenamePreview">区分と学生を選択してください</div>

      <div class="button-group">
        <button id="recordButton">録音開始</button>
        <button id="stopButton" disabled>停止</button>
      </div>
      <button id="saveButton" disabled>保存して送信</button>
    </div>

    <div id="status"></div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxyUSb1XF1T3BjNN2WI_mQ-gpYRKXyUpcSplAWoFcEjUiPXE5nalpv_pj-4Gp-o9C6v/exec";

    let els = {};
    let mediaRecorder, audioChunks = [], originalBlob = null, stream = null;

    document.addEventListener('DOMContentLoaded', () => {
      const ids = ['loginView', 'mainView', 'emailInput', 'otpRequestBtn', 'otpSection', 'otpInput', 'verifyBtn', 'categorySelect', 'studentSelect', 'filenamePreview', 'recordButton', 'stopButton', 'saveButton', 'status', 'audioPlayback'];
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) els[id] = el;
      });

      if (els.otpRequestBtn) els.otpRequestBtn.onclick = requestOTP;
      if (els.verifyBtn) els.verifyBtn.onclick = verifyOTP;
      if (els.recordButton) els.recordButton.onclick = startRecording;
      if (els.stopButton) els.stopButton.onclick = stopRecording;
      if (els.saveButton) els.saveButton.onclick = uploadAudio;
      if (els.categorySelect) els.categorySelect.onchange = updatePreview;
      if (els.studentSelect) els.studentSelect.onchange = updatePreview;

      checkSession();
    });

    function updateStatus(msg) {
      if (els.status) els.status.textContent = msg;
    }

    async function requestOTP() {
      const email = els.emailInput.value.trim();
      if (!email) return alert("メールアドレスを入力してください");
      updateStatus("SENDING...");
      const res = await callGas({ action: 'requestOTP', email });
      if (res.success) {
        els.otpSection.classList.remove('hidden');
        updateStatus("認証コードを送信しました");
      } else {
        updateStatus("ERROR: " + res.message);
      }
    }

    async function verifyOTP() {
      const email = els.emailInput.value.trim();
      const otp = els.otpInput.value.trim();
      updateStatus("VERIFYING...");
      const res = await callGas({ action: 'verifyOTP', email, otp });
      if (res.success) {
        localStorage.setItem('email', email);
        localStorage.setItem('token', res.sessionToken);
        checkSession();
      } else {
        updateStatus("認証コードが正しくありません");
      }
    }

    function checkSession() {
      const email = localStorage.getItem('email');
      const token = localStorage.getItem('token');
      if (email && token) {
        els.loginView.classList.add('hidden');
        els.mainView.classList.remove('hidden');
        loadStudents();
      } else {
        els.loginView.classList.remove('hidden');
        els.mainView.classList.add('hidden');
        updateStatus("LOGIN REQUIRED");
      }
    }

    async function loadStudents() {
      updateStatus("LOADING STUDENTS...");
      try {
        const res = await callGas({
          action: 'getStudents',
          email: localStorage.getItem('email'),
          sessionToken: localStorage.getItem('token')
        });
        if (res.authError) {
          localStorage.clear();
          checkSession();
          return;
        }
        els.studentSelect.innerHTML = '<option value="">-- 選択してください --</option>';
        res.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = `${s.id} ${s.name}`;
          els.studentSelect.appendChild(opt);
        });
        updateStatus("READY ✓");
        updatePreview();
      } catch (e) {
        updateStatus("CONNECTION ERROR");
      }
    }

    function updatePreview() {
      const cat = els.categorySelect.value;
      const sid = els.studentSelect.value;
      const now = new Date();
      const dateStr = String(now.getFullYear()).slice(2) + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
      const fname = sid ? `${cat}_${sid}_${dateStr}.mp3` : "";
      els.filenamePreview.innerHTML = fname ? `FILE: <b>${fname}</b>` : "区分と学生を選択してください";
      return fname;
    }

    async function startRecording() {
      if (!els.studentSelect.value) return alert("学生を選択してください");
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          originalBlob = new Blob(audioChunks, { type: 'audio/webm' });
          els.saveButton.disabled = false;
          els.recordButton.classList.remove('recording-state');
          els.recordButton.textContent = '録音開始';
        };
        mediaRecorder.start();
        els.recordButton.classList.add('recording-state');
        els.recordButton.textContent = 'REC...';
        els.recordButton.disabled = true;
        els.stopButton.disabled = false;
        updateStatus("RECORDING...");
      } catch (e) {
        alert("マイクの使用を許可してください");
      }
    }

    function stopRecording() {
      if (mediaRecorder) mediaRecorder.stop();
      if (stream) stream.getTracks().forEach(t => t.stop());
      els.stopButton.disabled = true;
      updateStatus("STOPPED");
    }

    async function uploadAudio() {
      const fname = updatePreview().replace('.mp3', '');
      updateStatus("SAVING...");
      els.saveButton.disabled = true;
      try {
        const mp3Blob = await encodeToMp3(originalBlob);
        const reader = new FileReader();
        reader.onloadend = async () => {
          const res = await callGas({
            audioDataUrl: reader.result,
            baseFileName: fname,
            email: localStorage.getItem('email'),
            sessionToken: localStorage.getItem('token')
          });
          if (res.success) {
            updateStatus("COMPLETED ✓");
          } else {
            updateStatus("ERROR: " + res.message);
            els.saveButton.disabled = false;
          }
        };
        reader.readAsDataURL(mp3Blob);
      } catch (e) {
        updateStatus("ERROR");
        els.saveButton.disabled = false;
      }
    }

    async function callGas(data) {
      const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(data) });
      return res.json();
    }

    async function encodeToMp3(blob) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const buf = await ctx.decodeAudioData(await blob.arrayBuffer());
      const encoder = new lamejs.Mp3Encoder(buf.numberOfChannels, buf.sampleRate, 128);
      const mp3Data = [];
      const l = toInt16(buf.getChannelData(0));
      const r = buf.numberOfChannels > 1 ? toInt16(buf.getChannelData(1)) : null;
      const size = 1152;
      for (let i = 0; i < l.length; i += size) {
        const lb = l.subarray(i, i + size);
        const rb = r ? r.subarray(i, i + size) : null;
        const mp3 = r ? encoder.encodeBuffer(lb, rb) : encoder.encodeBuffer(lb);
        if (mp3.length > 0) mp3Data.push(mp3);
      }
      const flush = encoder.flush();
      if (flush.length > 0) mp3Data.push(flush);
      return new Blob(mp3Data, { type: 'audio/mpeg' });
    }

    function toInt16(arr) {
      const res = new Int16Array(arr.length);
      for (let i = 0; i < arr.length; i++) res[i] = Math.max(-1, Math.min(1, arr[i])) * 32767;
      return res;
    }
  </script>
</body>

</html>
