<!DOCTYPE html>
<html lang="ja">

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面談録音ツール</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* 🎨 神山まるごと高専 モノトーン・ミニマルデザイン */
    :root {
      --font-main: 'Noto Sans JP', sans-serif;
      --color-bg: #FFFFFF;
      --color-text: #000000;
      --color-border: #000000;
      --color-accent: #000000;
      --color-hover: #FFFFFF;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-main);
      margin: 0;
      padding: 0;
      background-color: var(--color-bg);
      color: var(--color-text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 40px 20px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-align: left;
      margin-bottom: 40px;
      border-bottom: 2px solid var(--color-border);
      padding-bottom: 10px;
    }

    .input-group {
      margin-bottom: 30px;
    }

    .input-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    .input-group select,
    .input-group input {
      width: 100%;
      padding: 15px;
      border: 2px solid var(--color-border);
      border-radius: 0;
      /* 角を丸くしない */
      font-size: 16px;
      font-family: var(--font-main);
      color: var(--color-text);
      background: transparent;
      transition: all 0.2s ease;
      -webkit-appearance: none;
      /* デフォルトの矢印を消す（select用） */
    }

    /* selectの矢印をカスタムで追加（モノトーン） */
    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▼';
      font-size: 10px;
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .input-group select:focus,
    .input-group input:focus {
      outline: none;
      background-color: #f0f0f0;
    }

    .filename-preview {
      border: 1px solid #ccc;
      padding: 15px;
      font-size: 13px;
      color: #666;
      margin-bottom: 30px;
      min-height: 40px;
      text-align: center;
    }

    .filename-preview b {
      color: var(--color-text);
      font-weight: 500;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin: 30px 0;
    }

    button {
      flex: 1;
      border: 2px solid var(--color-border);
      border-radius: 0;
      /* 角丸をなくす */
      padding: 16px 20px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-main);
    }

    /* 白ボタン（黒文字） */
    #stopButton,
    #verifyBtn,
    #loadBtnPlaceholder {
      background-color: var(--color-bg);
      color: var(--color-text);
    }

    #stopButton:hover:not(:disabled),
    #verifyBtn:hover:not(:disabled) {
      background-color: #f0f0f0;
    }

    /* 黒ボタン（白文字） */
    #recordButton,
    #saveButton,
    #otpRequestBtn {
      background-color: var(--color-accent);
      color: var(--color-bg);
    }

    #recordButton:hover:not(:disabled),
    #saveButton:hover:not(:disabled),
    #otpRequestBtn:hover:not(:disabled) {
      background-color: var(--color-hover);
      color: var(--color-accent);
      border-color: var(--color-accent);
    }

    button:disabled {
      border-color: #ccc !important;
      color: #ccc !important;
      background-color: var(--color-bg) !important;
      cursor: not-allowed;
    }

    #status {
      margin-top: 30px;
      padding: 15px;
      font-size: 13px;
      font-weight: 400;
      text-align: center;
      color: #666;
      border: 1px solid transparent;
    }

    /* 録音中アニメーション（黒い円の点滅） */
    .recording {
      position: relative;
    }

    .recording::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      background-color: var(--color-accent);
      border-radius: 50%;
      margin-right: 10px;
      animation: pulse-mono 1s infinite;
    }

    @keyframes pulse-mono {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }

      100% {
        opacity: 1;
      }
    }

    .hidden {
      display: none;
    }

    /* レスポンシブ対応 */
    @media (max-width: 480px) {
      h1 {
        font-size: 18px;
      }

      button {
        font-size: 14px;
        padding: 14px 15px;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
</head>

<body>

  <div class="container">
    <h1>面談録音ツール</h1>

    <div id="loginView">
      <div class="input-group">
        <label>メールアドレス</label>
        <input type="email" id="emailInput" placeholder="example@gmail.com">
      </div>
      <button id="otpRequestBtn">認証コード送信</button>

      <div id="otpSection" class="hidden" style="margin-top:40px;">
        <div class="input-group">
          <label>認証コード (6桁)</label>
          <input type="text" id="otpInput" maxlength="6" placeholder="123456">
        </div>
        <button id="verifyBtn">ログイン</button>
      </div>
    </div>

    <div id="mainView" class="hidden">
      <div class="input-group">
        <label>区分</label>
        <div class="select-wrapper">
          <select id="categorySelect">
            <option value="学生面談">学生面談</option>
            <option value="まるさぽ">まるさぽ</option>
            <option value="クラマネ面談">クラマネ面談</option>
          </select>
        </div>
      </div>
      <div class="input-group">
        <label>学生</label>
        <div class="select-wrapper">
          <select id="studentSelect">
            <option value="">-- 読み込み中 --</option>
          </select>
        </div>
      </div>
      <div class="filename-preview" id="filenamePreview">区分と学生を選択してください</div>

      <div class="button-group">
        <button id="recordButton">録音開始</button>
        <button id="stopButton" disabled>停止</button>
      </div>
      <button id="saveButton" disabled>保存して送信</button>

      <audio id="audioPlayback" controls class="hidden" style="width:100%; margin-top:30px; border-radius:0;"></audio>
    </div>

    <div id="status">システム初期化中...</div>
  </div>

  <script>
    // ★GASのWebアプリURL
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxyUSb1XF1T3BjNN2WI_mQ-gpYRKXyUpcSplAWoFcEjUiPXE5nalpv_pj-4Gp-o9C6v/exec";

    let els = {};
    let mediaRecorder, audioChunks = [], originalBlob = null, stream = null;

    // 🚀 DOMContentLoaded: HTMLのタグが準備できた瞬間に実行（リロード対策）
    document.addEventListener('DOMContentLoaded', () => {
      const ids = ['loginView', 'mainView', 'emailInput', 'otpRequestBtn', 'otpSection', 'otpInput', 'verifyBtn', 'categorySelect', 'studentSelect', 'filenamePreview', 'recordButton', 'stopButton', 'saveButton', 'status', 'audioPlayback'];

      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) els[id] = el;
      });

      // イベント登録
      if (els.otpRequestBtn) els.otpRequestBtn.onclick = requestOTP;
      if (els.verifyBtn) els.verifyBtn.onclick = verifyOTP;
      if (els.recordButton) els.recordButton.onclick = startRecording;
      if (els.stopButton) els.stopButton.onclick = stopRecording;
      if (els.saveButton) els.saveButton.onclick = uploadAudio;
      if (els.categorySelect) els.categorySelect.onchange = updatePreview;
      if (els.studentSelect) els.studentSelect.onchange = updatePreview;

      // 起動時のセッションチェック
      checkSession();
    });

    function updateStatus(msg) {
      if (els.status) {
        els.status.textContent = msg;
      }
    }

    // --- 認証・通信ロジック ---
    async function requestOTP() {
      const email = els.emailInput.value.trim();
      if (!email) return alert("メールアドレスを入力してください");
      updateStatus("認証コード送信中...");
      const res = await callGas({ action: 'requestOTP', email });
      if (res.success) {
        els.otpSection.classList.remove('hidden');
        updateStatus("認証コードを送信しました");
      } else {
        updateStatus("エラー: " + res.message);
      }
    }

    async function verifyOTP() {
      const email = els.emailInput.value.trim();
      const otp = els.otpInput.value.trim();
      updateStatus("認証中...");
      const res = await callGas({ action: 'verifyOTP', email, otp });
      if (res.success) {
        localStorage.setItem('email', email);
        localStorage.setItem('token', res.sessionToken);
        checkSession();
      } else {
        updateStatus("認証コードが正しくありません");
      }
    }

    function checkSession() {
      const email = localStorage.getItem('email');
      const token = localStorage.getItem('token');
      if (email && token) {
        els.loginView.classList.add('hidden');
        els.mainView.classList.remove('hidden');
        loadStudents();
      } else {
        els.loginView.classList.remove('hidden');
        els.mainView.classList.add('hidden');
        updateStatus("ログインしてください");
      }
    }

    async function loadStudents() {
      updateStatus("学生リスト取得中...");
      try {
        const res = await callGas({
          action: 'getStudents',
          email: localStorage.getItem('email'),
          sessionToken: localStorage.getItem('token')
        });
        if (res.authError) {
          localStorage.clear();
          checkSession();
          return;
        }
        els.studentSelect.innerHTML = '<option value="">-- 選択してください --</option>';
        res.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = `${s.id} ${s.name} (${s.grade})`;
          els.studentSelect.appendChild(opt);
        });
        updateStatus("準備完了 ✓");
        updatePreview();
      } catch (e) {
        updateStatus("通信エラー。リロードしてください。");
      }
    }

    function updatePreview() {
      const cat = els.categorySelect.value;
      const sid = els.studentSelect.value;
      const now = new Date();
      const dateStr = String(now.getFullYear()).slice(2) + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
      const fname = sid ? `${cat}_${sid}_${dateStr}.mp3` : "";
      els.filenamePreview.innerHTML = fname ? `保存名: <b>${fname}</b>` : "区分と学生を選択してください";
      return fname;
    }

    async function startRecording() {
      if (!els.studentSelect.value) return alert("学生を選択してください");
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          originalBlob = new Blob(audioChunks, { type: 'audio/webm' });
          els.audioPlayback.src = URL.createObjectURL(originalBlob);
          els.audioPlayback.classList.remove('hidden');
          els.saveButton.disabled = false;
        };
        mediaRecorder.start();
        els.recordButton.disabled = true;
        els.recordButton.innerHTML = '<span class="recording">録音中...</span>';
        els.stopButton.disabled = false;
        updateStatus("マイク録音中...");
      } catch (e) {
        alert("マイクの使用を許可してください");
      }
    }

    function stopRecording() {
      if (mediaRecorder) mediaRecorder.stop();
      if (stream) stream.getTracks().forEach(t => t.stop());
      els.recordButton.disabled = false;
      els.recordButton.textContent = '録音開始';
      els.stopButton.disabled = true;
      updateStatus("録音停止。保存してください。");
    }

    async function uploadAudio() {
      const fname = updatePreview().replace('.mp3', '');
      updateStatus("保存中...（MP3変換中）");
      els.saveButton.disabled = true;
      try {
        const mp3Blob = await encodeToMp3(originalBlob);
        const reader = new FileReader();
        reader.onloadend = async () => {
          const res = await callGas({
            audioDataUrl: reader.result,
            baseFileName: fname,
            email: localStorage.getItem('email'),
            sessionToken: localStorage.getItem('token')
          });
          if (res.success) {
            updateStatus("保存完了！夜間に自動で文字起こしされます。");
            els.audioPlayback.classList.add('hidden');
          } else {
            updateStatus("エラー: " + res.message);
            els.saveButton.disabled = false;
          }
        };
        reader.readAsDataURL(mp3Blob);
      } catch (e) {
        updateStatus("エラーが発生しました");
        els.saveButton.disabled = false;
      }
    }

    async function callGas(data) {
      const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(data) });
      return res.json();
    }

    async function encodeToMp3(blob) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const buf = await ctx.decodeAudioData(await blob.arrayBuffer());
      const encoder = new lamejs.Mp3Encoder(buf.numberOfChannels, buf.sampleRate, 128);
      const mp3Data = [];
      const l = toInt16(buf.getChannelData(0));
      const r = buf.numberOfChannels > 1 ? toInt16(buf.getChannelData(1)) : null;
      const size = 1152;
      for (let i = 0; i < l.length; i += size) {
        const lb = l.subarray(i, i + size);
        const rb = r ? r.subarray(i, i + size) : null;
        const mp3 = r ? encoder.encodeBuffer(lb, rb) : encoder.encodeBuffer(lb);
        if (mp3.length > 0) mp3Data.push(mp3);
      }
      const flush = encoder.flush();
      if (flush.length > 0) mp3Data.push(flush);
      return new Blob(mp3Data, { type: 'audio/mpeg' });
    }

    function toInt16(arr) {
      const res = new Int16Array(arr.length);
      for (let i = 0; i < arr.length; i++) res[i] = Math.max(-1, Math.min(1, arr[i])) * 32767;
      return res;
    }
  </script>
</body>

</html>
