<!DOCTYPE html>
<html lang="ja">

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面談録音ツール</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      max-width: 500px;
      margin: auto;
    }

    h1 {
      color: #667eea;
      text-align: center;
      font-size: 24px;
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      font-size: 14px;
    }

    select,
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      transition: 0.3s;
    }

    .filename-preview {
      background: #f0f4ff;
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      color: #4A5568;
      margin: 15px 0;
      min-height: 40px;
      border-left: 4px solid #667eea;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    #recordButton {
      background: #11998e;
      color: white;
    }

    #stopButton {
      background: #ee0979;
      color: white;
    }

    #saveButton {
      background: #667eea;
      color: white;
      width: 100%;
    }

    button:disabled {
      background: #ccc !important;
      cursor: not-allowed;
    }

    #status {
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      background: #eee;
      margin-top: 10px;
    }

    .recording {
      background: #ff6b6b !important;
      color: white;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }

      100% {
        opacity: 1;
      }
    }

    .hidden {
      display: none;
    }

    b {
      color: #2b6cb0;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
</head>

<body>

  <div class="container">
    <h1>🎙️ 面談録音ツール</h1>

    <div id="loginView">
      <div class="input-group">
        <label>メールアドレス</label>
        <input type="email" id="emailInput" placeholder="example@gmail.com">
      </div>
      <button id="otpRequestBtn" style="background:#667eea; color:white; width:100%;">認証コード送信</button>

      <div id="otpSection" class="hidden" style="margin-top:20px;">
        <div class="input-group">
          <label>認証コード (6桁)</label>
          <input type="text" id="otpInput" maxlength="6">
        </div>
        <button id="verifyBtn" style="background:#11998e; color:white; width:100%;">ログイン</button>
      </div>
    </div>

    <div id="mainView" class="hidden">
      <div class="input-group">
        <label>📋 区分</label>
        <select id="categorySelect">
          <option value="学生面談">学生面談</option>
          <option value="まるさぽ">まるさぽ</option>
          <option value="クラマネ面談">クラマネ面談</option>
        </select>
      </div>
      <div class="input-group">
        <label>👤 学生を選択</label>
        <select id="studentSelect">
          <option value="">-- 読み込み中 --</option>
        </select>
      </div>
      <div class="filename-preview" id="filenamePreview">区分と学生を選択してください</div>

      <div class="button-group">
        <button id="recordButton">🔴 録音開始</button>
        <button id="stopButton" disabled>⏹️ 停止</button>
      </div>
      <button id="saveButton" disabled>💾 保存して送信</button>

      <audio id="audioPlayback" controls class="hidden" style="width:100%; margin-top:15px;"></audio>
    </div>

    <div id="status">システム準備中...</div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxyUSb1XF1T3BjNN2WI_mQ-gpYRKXyUpcSplAWoFcEjUiPXE5nalpv_pj-4Gp-o9C6v/exec";

    let els = {};
    let mediaRecorder, audioChunks = [], originalBlob = null, stream = null;

    // DOMContentLoaded: HTMLの読み込みが完了した瞬間に実行
    document.addEventListener('DOMContentLoaded', () => {
      const ids = ['loginView', 'mainView', 'emailInput', 'otpRequestBtn', 'otpSection', 'otpInput', 'verifyBtn', 'categorySelect', 'studentSelect', 'filenamePreview', 'recordButton', 'stopButton', 'saveButton', 'status', 'audioPlayback'];

      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) els[id] = el;
      });

      // イベント登録
      if (els.otpRequestBtn) els.otpRequestBtn.onclick = requestOTP;
      if (els.verifyBtn) els.verifyBtn.onclick = verifyOTP;
      if (els.recordButton) els.recordButton.onclick = startRecording;
      if (els.stopButton) els.stopButton.onclick = stopRecording;
      if (els.saveButton) els.saveButton.onclick = uploadAudio;
      if (els.categorySelect) els.categorySelect.onchange = updatePreview;
      if (els.studentSelect) els.studentSelect.onchange = updatePreview;

      // 初期起動処理
      checkSession();
    });

    function updateStatus(msg, type) {
      if (els.status) {
        els.status.textContent = msg;
        els.status.className = type || '';
      }
    }

    async function requestOTP() {
      const email = els.emailInput.value.trim();
      if (!email) return alert("メールアドレスを入力してください");
      updateStatus("認証コード送信中...");
      const res = await callGas({ action: 'requestOTP', email });
      if (res.success) {
        els.otpSection.classList.remove('hidden');
        updateStatus("認証コードを送信しました");
      } else {
        updateStatus("エラー: " + res.message);
      }
    }

    async function verifyOTP() {
      const email = els.emailInput.value.trim();
      const otp = els.otpInput.value.trim();
      updateStatus("認証中...");
      const res = await callGas({ action: 'verifyOTP', email, otp });
      if (res.success) {
        localStorage.setItem('email', email);
        localStorage.setItem('token', res.sessionToken);
        checkSession();
      } else {
        updateStatus("認証コードが正しくありません");
      }
    }

    function checkSession() {
      const email = localStorage.getItem('email');
      const token = localStorage.getItem('token');
      if (email && token) {
        els.loginView.classList.add('hidden');
        els.mainView.classList.remove('hidden');
        loadStudents();
      } else {
        els.loginView.classList.remove('hidden');
        els.mainView.classList.add('hidden');
        updateStatus("ログインしてください");
      }
    }

    async function loadStudents() {
      updateStatus("学生リスト取得中...");
      try {
        const res = await callGas({
          action: 'getStudents',
          email: localStorage.getItem('email'),
          sessionToken: localStorage.getItem('token')
        });

        if (res.authError) {
          localStorage.clear();
          checkSession();
          return;
        }

        els.studentSelect.innerHTML = '<option value="">-- 選択してください --</option>';
        res.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = `${s.id} ${s.name} (${s.grade})`;
          els.studentSelect.appendChild(opt);
        });
        updateStatus("準備完了 ✓");
        updatePreview();
      } catch (e) {
        updateStatus("通信エラー。リロードしてください。");
      }
    }

    function updatePreview() {
      const cat = els.categorySelect.value;
      const sid = els.studentSelect.value;
      const now = new Date();
      const dateStr = String(now.getFullYear()).slice(2) + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
      const fname = sid ? `${cat}_${sid}_${dateStr}.mp3` : "";
      els.filenamePreview.innerHTML = fname ? `保存名: <b>${fname}</b>` : "学生を選択してください";
      return fname;
    }

    async function startRecording() {
      if (!els.studentSelect.value) return alert("学生を選択してください");
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          originalBlob = new Blob(audioChunks, { type: 'audio/webm' });
          els.audioPlayback.src = URL.createObjectURL(originalBlob);
          els.audioPlayback.classList.remove('hidden');
          els.saveButton.disabled = false;
        };
        mediaRecorder.start();
        els.recordButton.disabled = true;
        els.recordButton.classList.add('recording');
        els.stopButton.disabled = false;
        updateStatus("録音中...");
      } catch (e) {
        alert("マイクの使用を許可してください");
      }
    }

    function stopRecording() {
      if (mediaRecorder) mediaRecorder.stop();
      if (stream) stream.getTracks().forEach(t => t.stop());
      els.recordButton.disabled = false;
      els.recordButton.classList.remove('recording');
      els.stopButton.disabled = true;
      updateStatus("録音停止。保存してください。");
    }

    async function uploadAudio() {
      const fname = updatePreview().replace('.mp3', '');
      updateStatus("保存中...（変換に数秒かかります）");
      els.saveButton.disabled = true;

      try {
        const mp3Blob = await encodeToMp3(originalBlob);
        const reader = new FileReader();
        reader.onloadend = async () => {
          const res = await callGas({
            audioDataUrl: reader.result,
            baseFileName: fname,
            email: localStorage.getItem('email'),
            sessionToken: localStorage.getItem('token')
          });
          if (res.success) {
            updateStatus("保存完了！", "success");
            els.audioPlayback.classList.add('hidden');
          } else {
            updateStatus("保存失敗: " + res.message);
            els.saveButton.disabled = false;
          }
        };
        reader.readAsDataURL(mp3Blob);
      } catch (e) {
        updateStatus("エラーが発生しました");
        els.saveButton.disabled = false;
      }
    }

    async function callGas(data) {
      const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(data) });
      return res.json();
    }

    async function encodeToMp3(blob) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const buf = await ctx.decodeAudioData(await blob.arrayBuffer());
      const encoder = new lamejs.Mp3Encoder(buf.numberOfChannels, buf.sampleRate, 128);
      const mp3Data = [];
      const l = toInt16(buf.getChannelData(0));
      const r = buf.numberOfChannels > 1 ? toInt16(buf.getChannelData(1)) : null;
      const size = 1152;
      for (let i = 0; i < l.length; i += size) {
        const lb = l.subarray(i, i + size);
        const rb = r ? r.subarray(i, i + size) : null;
        const mp3 = r ? encoder.encodeBuffer(lb, rb) : encoder.encodeBuffer(lb);
        if (mp3.length > 0) mp3Data.push(mp3);
      }
      const flush = encoder.flush();
      if (flush.length > 0) mp3Data.push(flush);
      return new Blob(mp3Data, { type: 'audio/mpeg' });
    }

    function toInt16(arr) {
      const res = new Int16Array(arr.length);
      for (let i = 0; i < arr.length; i++) res[i] = Math.max(-1, Math.min(1, arr[i])) * 32767;
      return res;
    }
  </script>
</body>

</html>
